name: Publish Tessl Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Publish Tessl plugin
        run: |
          set -euo pipefail
          plugin="$(jq -r '.name' .tessl-plugin/plugin.json)"
          version="$(jq -r '.version' .tessl-plugin/plugin.json)"

          if tessl plugin publish .; then
            exit 0
          fi

          echo "::warning::Publish command failed; checking whether ${plugin}@${version} exists in the registry."
          tessl plugin info "${plugin}@${version}"
